# mappings.conf — AI Config Manager source-to-target file mappings
#
# Format:  source_path : destination_path
#   - source_path:      relative to the repo root (this directory)
#   - destination_path: relative to $HOME/.<tool>/
#
# Sections: [claude], [codex], [gemini]
# Lines starting with # are comments. Inline comments are also supported.

# ══════════════════════════════════════════════════════════════════════════════
# CLAUDE — Full install (this repo is the Claude Code config source)
# ══════════════════════════════════════════════════════════════════════════════
[claude]
core/agents/          : agents/
core/modes/           : modes/
core/rules/           : rules/
core/mcp/             : mcp/
core/references/      : references/
core/scripts/         : scripts/
core/skills/          : skills/
core/templates/       : templates/
core/hooks/           : hooks/
core/settings.json    : settings.json
core/keybindings.json : keybindings.json
core/CLAUDE.md        : CLAUDE.md
core/FLAGS.md         : FLAGS.md
core/PRINCIPLES.md    : PRINCIPLES.md
# core/.mcp.json is NOT mapped here — Claude Code never reads .claude/.mcp.json. It's installed
# by src/mcp.js instead, straight to the locations Claude Code actually resolves MCP servers from:
# global -> ~/.claude.json's `mcpServers` key (merged); project scope -> <projectRoot>/.mcp.json.

# ══════════════════════════════════════════════════════════════════════════════
# CODEX — Subset: tool-agnostic rules, agents, and reference material
# ══════════════════════════════════════════════════════════════════════════════
[codex]
core/rules/      : rules/
core/agents/     : agents/
core/references/ : references/

# ══════════════════════════════════════════════════════════════════════════════
# GEMINI — Subset: tool-agnostic rules, agents, and reference material
# ══════════════════════════════════════════════════════════════════════════════
[gemini]
core/rules/      : rules/
core/agents/     : agents/
core/modes/      : modes/
core/skills/     : skills/
core/references/ : references/
