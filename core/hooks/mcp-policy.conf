# mcp-policy.conf — MCP tool deny patterns for mcp-tool-guard.sh
#
# Format (TAB-separated), identical convention to blocked-patterns.conf:
#   regex<TAB>reason shown to Claude
#
# Rules:
#   - Lines beginning with # are comments (skipped)
#   - Empty lines are skipped
#   - Regex is matched case-insensitively against the tool_name field
#     (e.g. "mcp__github__create_issue"), not a command string
#   - First matching pattern wins — order matters
#   - A malformed regex on any line is skipped (guard continues safely)
#   - This file ships with ZERO active patterns — every mcp__* call is allowed by
#     default. Uncomment/add patterns below once subagent-audit.sh's log (or your
#     own usage data) shows which MCP tools are actually in play; writing deny
#     rules before that is policy on a guess, not evidence (see
#     agent-docs/research/hook-governance-agent-tool-mcp-skill.md §3.2/§3.3).
#
# Examples (commented out — uncomment and adapt to activate):
# mcp__.*__delete.*	Destructive MCP operation blocked — confirm with user first
# mcp__.*__write.*	Write-shaped MCP tool blocked pending review
