# blocked-patterns.conf — Dangerous command patterns for pre-bash-guard.sh
#
# Format (TAB-separated):
#   regex<TAB>reason shown to Claude
#
# Rules:
#   - Lines beginning with # are comments (skipped)
#   - Empty lines are skipped
#   - Regex is matched case-insensitively against the full command string,
#     which includes any expanded heredocs or -m "..." arguments. Git and
#     rm patterns use a command-context anchor:
#       (?:^|\s*(?:&&|\|\||;)\s*)
#     so they only fire when the dangerous text is an actual invocation,
#     not when it appears as text inside a commit message or other argument.
#   - SQL patterns are intentionally NOT anchored — DROP/DELETE/TRUNCATE
#     inside heredoc-to-psql pipelines are real execution and must be caught.
#   - First matching pattern wins — order matters
#   - A malformed regex on any line is skipped (guard continues safely)
#
# Add project-specific patterns at the bottom of this file.

# ── Dangerous git operations ──────────────────────────────────────────────────
(?:^|\s*(?:&&|\|\||;)\s*)git push --force(?!-with-lease)	Force push blocked — use --force-with-lease or confirm with user first
(?:^|\s*(?:&&|\|\||;)\s*)git reset --hard	Destructive reset blocked — commit or stash changes before resetting
(?:^|\s*(?:&&|\|\||;)\s*)git clean -fd	Irreversible clean blocked — use --dry-run to preview what would be deleted

# ── Filesystem catastrophes ───────────────────────────────────────────────────
(?:^|\s*(?:&&|\|\||;)\s*)rm -rf\s+[/~]	Catastrophic delete blocked — path is too broad (affects root or home)
(?:^|\s*(?:&&|\|\||;)\s*)rm -rf\s+\$HOME	Catastrophic delete of HOME directory blocked
(?:^|\s*(?:&&|\|\||;)\s*)rm -rf\s+\$\{HOME\}	Catastrophic delete of HOME directory blocked (brace form)

# ── SQL destructive statements (no anchor — must catch inside psql heredocs) ──
DROP\s+(TABLE|DATABASE|SCHEMA)\s	Destructive DDL blocked — confirm with user before dropping
DELETE\s+FROM\s+\w+\s*;	Unscoped DELETE blocked — this would affect all rows, add a WHERE clause
TRUNCATE\s+TABLE	Irreversible truncate blocked — confirm with user before truncating

# ── Code execution from untrusted network sources ─────────────────────────────
(?:^|\s*(?:&&|\|\||;)\s*)(curl|wget)\s+\S+.*\|\s*(ba)?sh	Pipe-to-shell blocked — download and review the script before executing

# ── Broad permission grants ───────────────────────────────────────────────────
(?:^|\s*(?:&&|\|\||;)\s*)chmod\s+-R\s+777	chmod -R 777 blocked — grants world-write access recursively; use targeted permissions (e.g. chmod 755) instead

# ── Disk device operations ────────────────────────────────────────────────────
(?:^|\s*(?:&&|\|\||;)\s*)dd\s+if=/dev/	dd from block device blocked — can wipe or clone disks; confirm with user before any raw device operation

# ── Known limitation (not a pattern — comment only) ──────────────────────────
# eval-based indirection (e.g. CMD="git push --force"; eval "$CMD") bypasses all
# static pattern matching above. This is an inherent limitation of text-based
# guards. For high-security environments, supplement with branch protection
# rules and code review rather than relying solely on this guard.
